services:
  api:
    build:
      context: .
      target: development
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - db
    volumes:
     - .:/usr/src/app
     - /usr/src/app/node_modules
    command: npm run start:dev
    environment:
       CHOKIDAR_USEPOLLING: "true"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5435:5432'
    volumes:
      - 'db-data:/var/lib/postgresql/data'

  adminer: 
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db


volumes:
  db-data: